<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments :: head('Tratamentos')}"></head>
<body>
<div class="app-shell">
    <aside th:replace="~{fragments :: sidebar('tratamentos')}"></aside>
    <main class="page-content">
        <header th:replace="~{fragments :: pageHeader('Tratamentos', 'Defina serviços, preços e duração estimada.')}"></header>
        <div th:replace="~{fragments :: alerts}"></div>
        <section class="workspace-grid">
            <form class="data-form" th:action="@{/tratamentos/salvar}" th:object="${tratamento}" method="post">
                <div class="section-heading"><h2 th:text="${tratamento.id == null ? 'Novo tratamento' : 'Editar tratamento'}"></h2><p>A duração deve ser informada em horas.</p></div>
                <input type="hidden" th:field="*{id}">
                <label for="nome">Tratamento *</label><input id="nome" type="text" th:field="*{nome}"><span class="field-error" th:errors="*{nome}"></span>
                <label for="preco">Preço *</label><input id="preco" type="number" min="0.01" step="0.01" th:field="*{preco}"><span class="field-error" th:errors="*{preco}"></span>
                <label for="duracao">Duração (horas) *</label><input id="duracao" type="number" min="0.1" step="0.1" th:field="*{duracao}"><span class="field-error" th:errors="*{duracao}"></span>
                <div class="form-actions"><button class="primary-button" type="submit">Salvar</button><a class="secondary-button" th:if="${tratamento.id != null}" th:href="@{/tratamentos}">Cancelar</a></div>
            </form>
            <section class="data-region">
                <form class="search-bar" method="get" th:action="@{/tratamentos}"><input type="search" name="busca" th:value="${busca}" placeholder="Buscar tratamento"><button class="secondary-button" type="submit">Buscar</button></form>
                <div class="table-wrap"><table><thead><tr><th>Tratamento</th><th>Preço</th><th>Duração</th><th>Ações</th></tr></thead><tbody>
                <tr th:each="item : ${registros}"><td th:text="${item.nome}"></td><td th:text="${'R$ ' + item.preco}"></td><td th:text="${item.duracao + ' h'}"></td><td class="actions"><a th:href="@{/tratamentos/{id}/editar(id=${item.id})}">Editar</a><form th:action="@{/tratamentos/{id}/excluir(id=${item.id})}" method="post" data-confirm="Excluir este tratamento?"><button type="submit">Excluir</button></form></td></tr>
                <tr th:if="${#lists.isEmpty(registros)}"><td colspan="4" class="empty-state">Nenhum tratamento encontrado.</td></tr>
                </tbody></table></div>
            </section>
        </section>
    </main>
</div>
</body>
</html>
