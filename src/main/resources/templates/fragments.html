<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head th:fragment="head(titulo)">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title th:text="${titulo + ' | OdonTecWeb'}">OdonTecWeb</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
    <script defer th:src="@{/js/app.js}"></script>
</head>
<body>
<aside class="sidebar" th:fragment="sidebar(ativo)">
    <a class="brand" th:href="@{/dashboard}">
        <span class="brand-mark">OT</span>
        <span>OdonTecWeb</span>
    </a>

    <nav class="main-nav" aria-label="Menu principal">
        <a th:href="@{/dashboard}" th:classappend="${ativo == 'dashboard'} ? 'active'">Visão geral</a>
        <a th:href="@{/pacientes}" th:classappend="${ativo == 'pacientes'} ? 'active'">Pacientes</a>
        <a th:href="@{/dentistas}" th:classappend="${ativo == 'dentistas'} ? 'active'">Dentistas</a>
        <a th:href="@{/agenda}" th:classappend="${ativo == 'agenda'} ? 'active'">Agenda</a>
        <a th:href="@{/tratamentos}" th:classappend="${ativo == 'tratamentos'} ? 'active'">Tratamentos</a>
        <a th:href="@{/produtos}" th:classappend="${ativo == 'produtos'} ? 'active'">Produtos</a>
        <a th:href="@{/fornecedores}" th:classappend="${ativo == 'fornecedores'} ? 'active'">Fornecedores</a>
    </nav>

    <div class="sidebar-footer">
        <div class="user-summary">
            <strong th:text="${session.usuarioLogado.login()}">Usuário</strong>
            <span th:text="${session.usuarioLogado.tipoUsuario()}">Perfil</span>
        </div>
        <form th:action="@{/logout}" method="post">
            <button class="link-button" type="submit">Sair</button>
        </form>
    </div>
</aside>

<header class="page-header" th:fragment="pageHeader(titulo, subtitulo)">
    <div>
        <h1 th:text="${titulo}">Título</h1>
        <p th:text="${subtitulo}">Subtítulo</p>
    </div>
</header>

<div class="alert success" th:fragment="alerts" th:if="${sucesso}" th:text="${sucesso}"></div>
</body>
</html>
