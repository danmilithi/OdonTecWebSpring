<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments :: head('Produtos')}"></head>
<body>
<div class="app-shell">
    <aside th:replace="~{fragments :: sidebar('produtos')}"></aside>
    <main class="page-content">
        <header th:replace="~{fragments :: pageHeader('Produtos', 'Controle os materiais e quantidades disponíveis.')}"></header>
        <div th:replace="~{fragments :: alerts}"></div>
        <section class="workspace-grid">
            <form class="data-form" th:action="@{/produtos/salvar}" th:object="${produto}" method="post">
                <div class="section-heading"><h2 th:text="${produto.id == null ? 'Novo produto' : 'Editar produto'}"></h2><p>Informe preço e estoque atual.</p></div>
                <input type="hidden" th:field="*{id}">
                <label for="nome">Nome *</label><input id="nome" type="text" th:field="*{nome}"><span class="field-error" th:errors="*{nome}"></span>
                <label for="preco">Preço *</label><input id="preco" type="number" min="0.01" step="0.01" th:field="*{preco}"><span class="field-error" th:errors="*{preco}"></span>
                <label for="fornecedor">Fornecedor</label><input id="fornecedor" type="text" th:field="*{fornecedor}">
                <label for="quantidade">Quantidade *</label><input id="quantidade" type="number" min="0" th:field="*{quantidade}"><span class="field-error" th:errors="*{quantidade}"></span>
                <div class="form-actions"><button class="primary-button" type="submit">Salvar</button><a class="secondary-button" th:if="${produto.id != null}" th:href="@{/produtos}">Cancelar</a></div>
            </form>
            <section class="data-region">
                <form class="search-bar" method="get" th:action="@{/produtos}"><input type="search" name="busca" th:value="${busca}" placeholder="Buscar produto ou fornecedor"><button class="secondary-button" type="submit">Buscar</button></form>
                <div class="table-wrap"><table><thead><tr><th>Produto</th><th>Preço</th><th>Fornecedor</th><th>Estoque</th><th>Ações</th></tr></thead><tbody>
                <tr th:each="item : ${registros}"><td th:text="${item.nome}"></td><td th:text="${'R$ ' + item.preco}"></td><td th:text="${item.fornecedor ?: '-'}"></td><td th:text="${item.quantidade}"></td><td class="actions"><a th:href="@{/produtos/{id}/editar(id=${item.id})}">Editar</a><form th:action="@{/produtos/{id}/excluir(id=${item.id})}" method="post" data-confirm="Excluir este produto?"><button type="submit">Excluir</button></form></td></tr>
                <tr th:if="${#lists.isEmpty(registros)}"><td colspan="5" class="empty-state">Nenhum produto encontrado.</td></tr>
                </tbody></table></div>
            </section>
        </section>
    </main>
</div>
</body>
</html>
