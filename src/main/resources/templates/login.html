<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments :: head('Acesso')}"></head>
<body class="login-page">
<main class="login-shell">
    <section class="login-panel">
        <div class="login-brand">
            <span class="brand-mark">OT</span>
            <div>
                <h1>OdonTecWeb</h1>
                <p>Gestão da clínica odontológica</p>
            </div>
        </div>

        <form class="login-form" th:action="@{/login}" method="post">
            <div>
                <label for="login">Usuário</label>
                <input id="login" name="login" type="text" th:value="${login}" autocomplete="username" required autofocus>
            </div>
            <div>
                <label for="senha">Senha</label>
                <input id="senha" name="senha" type="password" autocomplete="current-password" required>
            </div>
            <p class="form-error" th:if="${erro}" th:text="${erro}"></p>
            <button class="primary-button full-width" type="submit">Entrar</button>
        </form>
    </section>
</main>
</body>
</html>
