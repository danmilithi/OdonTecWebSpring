<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments :: head('Pacientes')}"></head>
<body>
<div class="app-shell">
    <aside th:replace="~{fragments :: sidebar('pacientes')}"></aside>
    <main class="page-content">
        <header th:replace="~{fragments :: pageHeader('Pacientes', 'Cadastre e mantenha os dados dos pacientes.')}"></header>
        <div th:replace="~{fragments :: alerts}"></div>

        <section class="workspace-grid">
            <form class="data-form" th:action="@{/pacientes/salvar}" th:object="${paciente}" method="post">
                <div class="section-heading">
                    <h2 th:text="${paciente.id == null ? 'Novo paciente' : 'Editar paciente'}">Novo paciente</h2>
                    <p>Os campos com asterisco são obrigatórios.</p>
                </div>
                <input type="hidden" th:field="*{id}">
                <label for="nome">Nome *</label>
                <input id="nome" type="text" th:field="*{nome}">
                <span class="field-error" th:errors="*{nome}"></span>
                <label for="telefone">Telefone</label>
                <input id="telefone" type="text" th:field="*{telefone}">
                <label for="dataNascimento">Data de nascimento</label>
                <input id="dataNascimento" type="date" th:field="*{dataNascimento}">
                <label for="cep">CEP</label>
                <input id="cep" type="text" th:field="*{cep}">
                <div class="form-actions">
                    <button class="primary-button" type="submit">Salvar</button>
                    <a class="secondary-button" th:if="${paciente.id != null}" th:href="@{/pacientes}">Cancelar</a>
                </div>
            </form>

            <section class="data-region">
                <form class="search-bar" method="get" th:action="@{/pacientes}">
                    <input type="search" name="busca" th:value="${busca}" placeholder="Buscar por nome ou telefone">
                    <button class="secondary-button" type="submit">Buscar</button>
                </form>
                <div class="table-wrap">
                    <table>
                        <thead><tr><th>Nome</th><th>Telefone</th><th>Nascimento</th><th>CEP</th><th>Ações</th></tr></thead>
                        <tbody>
                        <tr th:each="item : ${registros}">
                            <td th:text="${item.nome}"></td>
                            <td th:text="${item.telefone ?: '-'}"></td>
                            <td th:text="${item.dataNascimento ?: '-'}"></td>
                            <td th:text="${item.cep ?: '-'}"></td>
                            <td class="actions">
                                <a th:href="@{/pacientes/{id}/editar(id=${item.id})}">Editar</a>
                                <form th:action="@{/pacientes/{id}/excluir(id=${item.id})}" method="post" data-confirm="Excluir este paciente?">
                                    <button type="submit">Excluir</button>
                                </form>
                            </td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(registros)}"><td colspan="5" class="empty-state">Nenhum paciente encontrado.</td></tr>
                        </tbody>
                    </table>
                </div>
            </section>
        </section>
    </main>
</div>
</body>
</html>
