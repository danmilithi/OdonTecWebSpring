<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments :: head('Dentistas')}"></head>
<body>
<div class="app-shell">
    <aside th:replace="~{fragments :: sidebar('dentistas')}"></aside>
    <main class="page-content">
        <header th:replace="~{fragments :: pageHeader('Dentistas', 'Organize a equipe e suas especialidades.')}"></header>
        <div th:replace="~{fragments :: alerts}"></div>
        <section class="workspace-grid">
            <form class="data-form" th:action="@{/dentistas/salvar}" th:object="${dentista}" method="post">
                <div class="section-heading"><h2 th:text="${dentista.id == null ? 'Novo dentista' : 'Editar dentista'}"></h2><p>Informe os dados profissionais.</p></div>
                <input type="hidden" th:field="*{id}">
                <label for="nome">Nome *</label><input id="nome" type="text" th:field="*{nome}"><span class="field-error" th:errors="*{nome}"></span>
                <label for="especialidade">Especialidade *</label><input id="especialidade" type="text" th:field="*{especialidade}"><span class="field-error" th:errors="*{especialidade}"></span>
                <div class="form-actions"><button class="primary-button" type="submit">Salvar</button><a class="secondary-button" th:if="${dentista.id != null}" th:href="@{/dentistas}">Cancelar</a></div>
            </form>
            <section class="data-region">
                <form class="search-bar" method="get" th:action="@{/dentistas}"><input type="search" name="busca" th:value="${busca}" placeholder="Buscar nome ou especialidade"><button class="secondary-button" type="submit">Buscar</button></form>
                <div class="table-wrap"><table><thead><tr><th>Nome</th><th>Especialidade</th><th>Ações</th></tr></thead><tbody>
                <tr th:each="item : ${registros}"><td th:text="${item.nome}"></td><td th:text="${item.especialidade}"></td><td class="actions"><a th:href="@{/dentistas/{id}/editar(id=${item.id})}">Editar</a><form th:action="@{/dentistas/{id}/excluir(id=${item.id})}" method="post" data-confirm="Excluir este dentista?"><button type="submit">Excluir</button></form></td></tr>
                <tr th:if="${#lists.isEmpty(registros)}"><td colspan="3" class="empty-state">Nenhum dentista encontrado.</td></tr>
                </tbody></table></div>
            </section>
        </section>
    </main>
</div>
</body>
</html>
